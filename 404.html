<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Router</title>
    <script>
        var loc = window.location;
        var pathName = loc.pathname.substring(1).replace(/\/$/, "");
        var destination = loc.protocol + "//" + loc.hostname + (loc.port ? ":" + loc.port : "");
        
        if (pathName) {
            loc.replace(destination + "/?p=" + pathName + loc.hash);
        } else {
            loc.replace(destination + "/?p=arp" + loc.hash);
        }
    </script>
</head>
<body>
</body>
</html>
