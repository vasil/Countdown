<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Router</title>
    <script>
        var loc = window.location;
        var pathParts = loc.pathname.split('/').filter(Boolean);
        var presentation = pathParts.pop() || 'arp';
        var basePath = pathParts.length > 0 ? '/' + pathParts.join('/') + '/' : '/';
        loc.replace(loc.protocol + "//" + loc.host + basePath + "?p=" + presentation + loc.hash);
    </script>
</head>
<body>
</body>
</html>
