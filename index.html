<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation Root</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: #000;
    color: #fff;
    overflow: hidden;
    font-family: monospace;
  }
  #viewport {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  .layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #scroll-layer { z-index: 1; }
  #clock-layer { z-index: 2; }
  #slide-layer { 
    z-index: 3; 
    display: flex; 
    align-items: center; 
    justify-content: center;
  }
  .scrolling-content {
    width: 100%;
    position: absolute;
  }
</style>
</head>
<body>
<div id="viewport">
  <div id="scroll-layer" class="layer"></div>
  <div id="clock-layer" class="layer"></div>
  <div id="slide-layer" class="layer"></div>
</div>

<script>
  let slideData = [];
  let totalDurationMs = 0;
  let currentIndex = 0;
  let autoAdvanceTimer = null;

  async function initializePresentation() {
    const pathSegments = window.location.pathname.split('/').filter(Boolean);
    const presentationName = pathSegments.length > 0 ? pathSegments[0] : 'aaa';
    
    try {
      const response = await fetch(`/${presentationName}.json`);
      if (!response.ok) throw new Error('Configuration fetch failed');
      const config = await response.json();
      
      slideData = config.slides;
      totalDurationMs = config.duration_minutes * 60 * 1000;
      
      setupContinuousScroll(config.scrolling_background);
      setupHistoryNavigation();
      renderSlide(0);
      startAutoAdvance();
    } catch (error) {
      console.error('Initialization error:', error);
    }
  }

  function setupContinuousScroll(scrollConfig) {
    if (!scrollConfig) return;
    
    const layer = document.getElementById('scroll-layer');
    const img = document.createElement('img');
    img.src = scrollConfig.source;
    img.className = 'scrolling-content';
    layer.appendChild(img);

    const distance = scrollConfig.distance || '100%';
    const translateYStart = scrollConfig.direction === 'up' ? '0' : `-${distance}`;
    const translateYEnd = scrollConfig.direction === 'up' ? `-${distance}` : '0';

    img.animate([
      { transform: `translateY(${translateYStart})` },
      { transform: `translateY(${translateYEnd})` }
    ], {
      duration: totalDurationMs,
      iterations: 1,
      fill: 'forwards',
      easing: 'linear'
    });
  }

  function renderSlide(index) {
    currentIndex = index;
    const layer = document.getElementById('slide-layer');
    layer.innerHTML = '';
    
    const slide = slideData[index];
    if (slide && slide.image) {
      const img = document.createElement('img');
      img.src = slide.image;
      img.style.maxWidth = '100%';
      img.style.maxHeight = '100%';
      layer.appendChild(img);
    }
  }

  function startAutoAdvance() {
    if (autoAdvanceTimer) clearInterval(autoAdvanceTimer);
    if (slideData.length <= 1) return;
    
    const slideIntervalMs = totalDurationMs / slideData.length;
    
    autoAdvanceTimer = setInterval(() => {
      if (currentIndex < slideData.length - 1) {
        currentIndex++;
        window.history.pushState({ index: currentIndex }, '');
        renderSlide(currentIndex);
      } else {
        clearInterval(autoAdvanceTimer);
      }
    }, slideIntervalMs);
  }

  function handleManualNavigation(direction) {
    if (direction === 'next' && currentIndex < slideData.length - 1) {
      currentIndex++;
    } else if (direction === 'prev' && currentIndex > 0) {
      currentIndex--;
    } else {
      return;
    }
    
    window.history.pushState({ index: currentIndex }, '');
    renderSlide(currentIndex);
    startAutoAdvance();
  }

  function setupHistoryNavigation() {
    window.history.replaceState({ index: 0 }, '');
    
    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.index !== undefined) {
        currentIndex = event.state.index;
        renderSlide(currentIndex);
        startAutoAdvance(); 
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.code === 'Space' || event.code === 'ArrowRight') {
        handleManualNavigation('next');
      } else if (event.code === 'ArrowLeft') {
        handleManualNavigation('prev');
      }
    });
  }

  document.addEventListener('DOMContentLoaded', initializePresentation);
</script>
</body>
</html>
